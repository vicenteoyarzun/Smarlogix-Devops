name: Build, Push and Deploy to EKS

on:
  push:
    branches:
      - main
      - features/devops

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and Push microservices to ECR
      env:
        ECR_REGISTRY: ${{ secrets.ECR_REPOSITORY }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        services=("envios" "inventory" "pedidos" "usuario" "eureka")
        for service in "${services[@]}"; do
          echo "========================================="
          echo "Building smartlogix-$service..."
          echo "========================================="
          docker build -f "./Backend/Dockerfile" -t "$ECR_REGISTRY/smartlogix-$service:$IMAGE_TAG" "./Backend/$service"
          docker push "$ECR_REGISTRY/smartlogix-$service:$IMAGE_TAG"
          echo "✓ smartlogix-$service pushed successfully"
        done

    - name: Update Kubeconfig for EKS
      run: |
        aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

    - name: Deploy to EKS
      env:
        ECR_REGISTRY: ${{ secrets.ECR_REPOSITORY }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        sed -i "s|\${IMAGE_TAG}|$IMAGE_TAG|g" k8s/backend.yml
        sed -i "s|ECR_REGISTRY|$ECR_REGISTRY|g" k8s/backend.yml
        kubectl apply -f k8s/backend.yml
        echo "✓ Deployment completed"
