# Server Configuration
server.port=8082
server.servlet.context-path=/api

# Eureka Client Configuration
spring.application.name=envios-service
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
eureka.instance.prefer-ip-address=true

# Database Configuration - PostgreSQL Insforge
spring.datasource.url=jdbc:postgresql://${DB_HOST:7cmtd4i3.us-east.database.insforge.app}:${DB_PORT:5432}/${DB_NAME:insforge}?sslmode=${SSL_MODE:require}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:cc044497c62bdf7e4c5dff81f171d4af}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
