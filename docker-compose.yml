version: '3.8'

services:
  # Backend - Usuario Service
  usuario:
    build:
      context: ./Backend
    container_name: smartlogix-usuario
    environment:
      SPRING_APPLICATION_NAME: usuario
      SERVER_PORT: 8080
    ports:
      - "8081:8080"
    networks:
      - smartlogix-net

  # Backend - Pedidos Service
  pedidos:
    build:
      context: ./Backend
    container_name: smartlogix-pedidos
    environment:
      SPRING_APPLICATION_NAME: pedidos
      SERVER_PORT: 8080
    ports:
      - "8082:8080"
    networks:
      - smartlogix-net

  # Backend - Inventario Service
  inventario:
    build:
      context: ./Backend
    container_name: smartlogix-inventario
    environment:
      SPRING_APPLICATION_NAME: inventario
      SERVER_PORT: 8080
    ports:
      - "8083:8080"
    networks:
      - smartlogix-net

  # Backend - Envios Service
  envios:
    build:
      context: ./Backend
    container_name: smartlogix-envios
    environment:
      SPRING_APPLICATION_NAME: envios
      SERVER_PORT: 8080
    ports:
      - "8084:8080"
    networks:
      - smartlogix-net

networks:
  smartlogix-net:
    driver: bridge
