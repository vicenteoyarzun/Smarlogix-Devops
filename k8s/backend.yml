# Deployment - smartlogix-usuario
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartlogix-usuario
  labels:
    app: smartlogix-usuario
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smartlogix-usuario
  template:
    metadata:
      labels:
        app: smartlogix-usuario
    spec:
      containers:
      - name: smartlogix-usuario
        image: ECR_REGISTRY/smartlogix-usuario:${IMAGE_TAG}
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_APPLICATION_NAME
          value: "usuario"
        - name: SERVER_PORT
          value: "8080"

---
# Service - smartlogix-usuario
apiVersion: v1
kind: Service
metadata:
  name: smartlogix-usuario
spec:
  type: LoadBalancer
  selector:
    app: smartlogix-usuario
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080

